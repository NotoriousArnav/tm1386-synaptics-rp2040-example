#
# build.yml — CI/CD for pico-touchpad-tm1386
#
# Builds the firmware on every push/PR and publishes a release on every
# push to main with the .uf2 renamed to release-<commit>-build.uf2.

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout pico-sdk
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 2.2.0
          path: pico-sdk

      - name: Initialize pico-sdk submodules
        working-directory: pico-sdk
        run: git submodule update --init

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/main.uf2

      - name: Package PS/2 Library
        run: zip -r ps2-library.zip lib/ps2/

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: library
          path: ps2-library.zip

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Download library artifact
        uses: actions/download-artifact@v4
        with:
          name: library

      - name: Rename artifacts
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv main.uf2 "release-${SHORT_SHA}-build.uf2"
          mv ps2-library.zip "lib-${SHORT_SHA}-release.zip"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "UF2_NAME=release-${SHORT_SHA}-build.uf2" >> "$GITHUB_ENV"
          echo "LIB_NAME=lib-${SHORT_SHA}-release.zip" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.SHORT_SHA }}
          name: Build ${{ env.SHORT_SHA }}
          body: |
            Automated build from commit [`${{ env.SHORT_SHA }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).
          files: |
            ${{ env.UF2_NAME }}
            ${{ env.LIB_NAME }}
